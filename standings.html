<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robotics Tournament Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  font-family:Inter, sans-serif;
  background:#0f172a;
  color:#e2e8f0;
  margin:0;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:linear-gradient(120deg, rgba(59,130,246,0.05) 1px, transparent 1px), 
             linear-gradient(30deg, rgba(59,130,246,0.05) 1px, transparent 1px);
  background-size:50px 50px;
  z-index:-1;
}

header{
  text-align:center;
  padding:30px 15px;
}

header h1{
  color:#3b82f6;
  font-weight:700;
  text-shadow:0 0 20px #3b82f6;
}

main{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h2{
  text-align:center;
  margin:40px 0 20px;
  color:#3b82f6;
  text-shadow:0 0 10px #3b82f6;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:50px;
}

thead th{
  padding:10px;
  color:#3b82f6;
  border-bottom:2px solid #3b82f6;
}

tbody td{
  padding:8px;
  text-align:center;
  border-bottom:1px solid #1e3a8a;
}

tbody tr{
  cursor:pointer;
}

tbody tr:hover{
  background:#1e293b;
  color:#fff;
  text-shadow:0 0 8px #3b82f6;
}

.rank1 td{color:#ffd700;}
.rank2 td{color:#c0c0c0;}
.rank3 td{color:#cd7f32;}

.modal-header{
  background:#1e40af;
  color:white;
}

.modal-table th{
  background:#0f172a;
  color:#3b82f6;
}
</style>
</head>

<body>

<header>
<h1>Robotics Tournament</h1>
</header>

<main>

<h2>Standings</h2>
<table>
<thead>
<tr>
<th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>Pts</th><th>GD</th><th>GF</th><th>GA</th>
</tr>
</thead>
<tbody id="standings"></tbody>
</table>

</main>

<div class="modal fade" id="teamModal">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content bg-dark text-light">
<div class="modal-header">
<h5 class="modal-title" id="teamTitle"></h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<h5>Members</h5>
<ul id="members"></ul>

<h5>Performance</h5>
<p id="performanceText"></p>

<h5>Match History</h5>

<table class="table table-dark modal-table">
<thead>
<tr>
<th>Date</th>
<th>Opponent</th>
<th>Result</th>
<th>Score</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>

</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

// Day1
const day1=[
{teamA:"Team 1",teamB:"Team 16",scoreA:0,scoreB:4,date:"2026-03-07"},
{teamA:"Team 2",teamB:"Team 15",scoreA:2,scoreB:0,date:"2026-03-07"},

// Day2
const day2=[
{teamA:"Team 18",teamB:"Team 13",scoreA:0,scoreB:2,date:"2026-03-08"},
{teamA:"Team 3",teamB:"Team 12",scoreA:0,scoreB:0,date:"2026-03-08"},
{teamA:"Team 6",teamB:"Team 9",scoreA:1,scoreB:0,date:"2026-03-08"},
{teamA:"Team 4",teamB:"Team 11",scoreA:4,scoreB:0,date:"2026-03-08"},
{teamA:"Team 7",teamB:"Team 8",scoreA:3,scoreB:0,date:"2026-03-08"},
{teamA:"Team 5",teamB:"Team 10",scoreA:4,scoreB:0,date:"2026-03-08"},
{teamA:"Team 17",teamB:"Team 2",scoreA:0,scoreB:2,date:"2026-03-08"},
{teamA:"Team 1",teamB:"Team 15",scoreA:4,scoreB:0,date:"2026-03-08"},
{teamA:"Team 16",teamB:"Team 14",scoreA:1,scoreB:0,date:"2026-03-08"}
];

function update(results){
results.forEach(r=>{
const A=teams.find(t=>t.name===r.teamA);
const B=teams.find(t=>t.name===r.teamB);

A.played++;B.played++;

A.gf+=r.scoreA;A.ga+=r.scoreB;
B.gf+=r.scoreB;B.ga+=r.scoreA;

A.gd=A.gf-A.ga;
B.gd=B.gf-B.ga;

if(r.scoreA>r.scoreB){A.wins++;A.points+=3;B.losses++;}
else if(r.scoreB>r.scoreA){B.wins++;B.points+=3;A.losses++;}
else{A.draws++;B.draws++;A.points++;B.points++;}

A.history.push({date:r.date,opponent:B.name,result:r.scoreA>r.scoreB?"W":r.scoreA<r.scoreB?"L":"D",score:r.scoreA+"-"+r.scoreB});
B.history.push({date:r.date,opponent:A.name,result:r.scoreB>r.scoreA?"W":r.scoreB<r.scoreA?"L":"D",score:r.scoreB+"-"+r.scoreA});
});
}

update(day1);
update(day2);

function standings(){
const table=document.getElementById("standings");
table.innerHTML="";

teams.sort((a,b)=>b.points-a.points||b.gd-a.gd||b.gf-a.gf);

teams.forEach((t,i)=>{
const tr=document.createElement("tr");

if(i==0)tr.classList.add("rank1");
if(i==1)tr.classList.add("rank2");
if(i==2)tr.classList.add("rank3");

tr.innerHTML=`
<td>${i+1}</td>
<td>${t.name}</td>
<td>${t.played}</td>
<td>${t.wins}</td>
<td>${t.draws}</td>
<td>${t.losses}</td>
<td>${t.points}</td>
<td>${t.gd}</td>
<td>${t.gf}</td>
<td>${t.ga}</td>
`;

tr.onclick=()=>showTeam(t);
table.appendChild(tr);
});
}

function showTeam(team){

document.getElementById("teamTitle").innerText=team.name;

const members=document.getElementById("members");
members.innerHTML="";
team.members.forEach(m=>{
const li=document.createElement("li");
li.textContent=m;
members.appendChild(li);
});

document.getElementById("performanceText").innerText=
"Wins: "+team.wins+" Draws: "+team.draws+" Losses: "+team.losses;

const history=document.getElementById("history");
history.innerHTML="";

team.history.forEach(h=>{
const tr=document.createElement("tr");
tr.innerHTML=`
<td>${h.date}</td>
<td>${h.opponent}</td>
<td>${h.result}</td>
<td>${h.score}</td>
`;
history.appendChild(tr);
});

new bootstrap.Modal(document.getElementById("teamModal")).show();
}

standings();
