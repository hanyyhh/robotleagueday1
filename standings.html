<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robotics Tournament Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  font-family:Inter, sans-serif;
  background:#0f172a;
  color:#e2e8f0;
  margin:0;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:linear-gradient(120deg, rgba(59,130,246,0.05) 1px, transparent 1px), 
             linear-gradient(30deg, rgba(59,130,246,0.05) 1px, transparent 1px);
  background-size:50px 50px;
  z-index:-1;
}

header{
  text-align:center;
  padding:30px 15px;
}

header h1{
  color:#3b82f6;
  font-weight:700;
  text-shadow:0 0 20px #3b82f6;
}

main{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h2{
  text-align:center;
  margin:40px 0 20px;
  color:#3b82f6;
  text-shadow:0 0 10px #3b82f6;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:50px;
}

thead th{
  padding:10px;
  color:#3b82f6;
  border-bottom:2px solid #3b82f6;
}

tbody td{
  padding:8px;
  text-align:center;
  border-bottom:1px solid #1e3a8a;
  transition:0.3s all;
}

tbody tr{
  cursor:pointer;
  transition:0.3s all;
}

tbody tr:hover{
  background:#1e293b;
  color:#fff;
  text-shadow:0 0 8px #3b82f6;
}

.rank1 td{color:#ffd700; text-shadow:0 0 15px gold;}
.rank2 td{color:#c0c0c0; text-shadow:0 0 12px silver;}
.rank3 td{color:#cd7f32; text-shadow:0 0 12px #cd7f32;}

.modal-header{
  background:#1e40af;
  color:white;
}

.modal-table th{
  background:#0f172a;
  color:#3b82f6;
  text-align:center;
  border-bottom:1px solid #3b82f6;
}

.modal-table td{
  text-align:center;
  padding:8px 0;
  border-bottom:1px solid #1e40af;
}
</style>
</head>

<body>

<header>
<h1>Robotics Tournament</h1>
</header>

<main>

<h2>Standings</h2>
<table>
<thead>
<tr>
<th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>Pts</th><th>GD</th><th>GF</th><th>GA</th>
</tr>
</thead>
<tbody id="standings"></tbody>
</table>

</main>

<!-- Team Modal -->
<div class="modal fade" id="teamModal">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content bg-dark text-light">
<div class="modal-header">
<h5 class="modal-title" id="teamTitle"></h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<h5>Members</h5>
<ul id="members"></ul>

<h5>Performance</h5>
<p id="performanceText"></p>

<h5>Match History</h5>
<table class="table table-dark modal-table">
<thead>
<tr>
<th>Day</th><th>Opponent</th><th>Result</th><th>Score</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>
</div>
</div>
</div>

<script>

const teams = [

{name:"Team 5",members:["Oussama hrioued","Lemsyah majda","Basma naddari","Daaraoui Kenza","Daif hajar","Yasser Boulaajoul","Lina Elksabi"],history:[],played:0,wins:0,draws:0,losses:0,points:0,gf:0,ga:0,gd:0},
{name:"Team 6",members:["Leila manssouri azzouzi","Yassine Bekkali","mouad archkak","Bournakhla mohammed","Chaimae Gannaoui","Kada fatima zohra","Yasmine hamsane"],history:[],played:0,wins:0,draws:0,losses:0,points:0,gf:0,ga:0,gd:0},
{name:"Team 7",members:["Jou hamza","IHSSANE ELAABOUS","Doha zouahri","AGZAL ADAM","Fatima zzahra Hamzaoui","Aya boutaleb"],history:[],played:0,wins:0,draws:0,losses:0,points:0,gf:0,ga:0,gd:0},
{name:"Team 8",members:["Ayoub hammamoun","Olaya benmimoune","mouad messaoudi","HAMZA NACIRI","Safae ELABDELLAOUI","Aoussam Nezha","racha benhamou"],history:[],played:0,wins:0,draws:0,losses:0,points:0,gf:0,ga:0,gd:0},

{name:"Team 10",members:["Moad ait ali oubrahim","Tourab Soukaina","Mahra hlalou","EL MARKADI Hajar","Hamza belkhadir","Ismail joubair","mohamed ammar"],history:[],played:0,wins:0,draws:0,losses:0,points:0,gf:0,ga:0,gd:0},

{name:"Team 12",members:["Adam el baroudi","Maha Hafdi","Alae eddine bouryal","Hajar El Harradi","Tasnime slimani","Razouki khadija","Ettalhi chaimae"],history:[],played:0,wins:0,draws:0,losses:0,points:0,gf:0,ga:0,gd:0},
{name:"Team 13",members:["hani ez zhar","Ahmed Samir maqdissi","Ismail Sabir","Doha faih","salah eddin harouache","Zarghoune Islam"],history:[],played:0,wins:0,draws:0,losses:0,points:0,gf:0,ga:0,gd:0},
{name:"Team 14",members:["TAHA EL GHASSEL","Mohamed yassine elkhatibi","Douhaoui Douae","Bertal sara","Imane abidar","Hossine brital"],history:[],played:0,wins:0,draws:0,losses:0,points:0,gf:0,ga:0,gd:0},
{name:"Team 15",members:["Youssef Yadini","Oussama ID LAASRI","Hafssa Mahjoub","Belokda houda","Nour EL hajji","Hanane boukassal"],history:[],played:0,wins:0,draws:0,losses:0,points:0,gf:0,ga:0,gd:0},
{name:"Team 16",members:["Belghazi Basma","Tarmoun marwa","Yahya litim","Bouchra Balaje","Aoussam Rania","Abderrahmane ait mansour","Soukaina benzaddou"],history:[],played:0,wins:0,draws:0,losses:0,points:0,gf:0,ga:0,gd:0},
{name:"Team 17",members:["Yasser Yjjou","Nissrine el haini","Fath-allah amine","Soufiane chlieh","Zayneb Richard","soumia BEN-FARES"],history:[],played:0,wins:0,draws:0,losses:0,points:0,gf:0,ga:0,gd:0},
{name:"Team 18",members:["Amine essalhi","Safa tarmoun","yassine hatana","Hafsa kadmi","Soufiane labrag","Aya El_frouni"],history:[],played:0,wins:0,draws:0,losses:0,points:0,gf:0,ga:0,gd:0}
];

const results = [

{day:"Day 1",teamA:"Team 1",teamB:"Team 16",scoreA:0,scoreB:4},
{day:"Day 1",teamA:"Team 2",teamB:"Team 15",scoreA:2,scoreB:0},
{day:"Day 1",teamA:"Team 3",teamB:"Team 14",scoreA:4,scoreB:4},
{day:"Day 1",teamA:"Team 4",teamB:"Team 13",scoreA:0,scoreB:4},
{day:"Day 1",teamA:"Team 5",teamB:"Team 12",scoreA:1,scoreB:0},
{day:"Day 1",teamA:"Team 6",teamB:"Team 17",scoreA:1,scoreB:2},
{day:"Day 1",teamA:"Team 7",teamB:"Team 10",scoreA:2,scoreB:0},
{day:"Day 1",teamA:"Team 8",teamB:"Team 9",scoreA:0,scoreB:2},
{day:"Day 1",teamA:"Team 18",teamB:"Team 11",scoreA:0,scoreB:4},

{day:"Day 2",teamA:"Team 18",teamB:"Team 13",scoreA:0,scoreB:2},
{day:"Day 2",teamA:"Team 3",teamB:"Team 12",scoreA:0,scoreB:0},
{day:"Day 2",teamA:"Team 6",teamB:"Team 9",scoreA:1,scoreB:0},
{day:"Day 2",teamA:"Team 4",teamB:"Team 11",scoreA:4,scoreB:0},
{day:"Day 2",teamA:"Team 7",teamB:"Team 8",scoreA:3,scoreB:0},
{day:"Day 2",teamA:"Team 5",teamB:"Team 10",scoreA:4,scoreB:0},
{day:"Day 2",teamA:"Team 17",teamB:"Team 2",scoreA:0,scoreB:2},
{day:"Day 2",teamA:"Team 1",teamB:"Team 15",scoreA:0,scoreB:4},
{day:"Day 2",teamA:"Team 16",teamB:"Team 14",scoreA:1,scoreB:0}

];

results.forEach(r=>{
const A=teams.find(t=>t.name===r.teamA);
const B=teams.find(t=>t.name===r.teamB);

A.played++;B.played++;

A.gf+=r.scoreA;A.ga+=r.scoreB;
B.gf+=r.scoreB;B.ga+=r.scoreA;

A.gd=A.gf-A.ga;
B.gd=B.gf-B.ga;

if(r.scoreA>r.scoreB){A.wins++;B.losses++;A.points+=3;}
else if(r.scoreA<r.scoreB){B.wins++;A.losses++;B.points+=3;}
else{A.draws++;B.draws++;A.points++;B.points++;}

A.history.push({day:r.day,opponent:r.teamB,score:`${r.scoreA}-${r.scoreB}`});
B.history.push({day:r.day,opponent:r.teamA,score:`${r.scoreB}-${r.scoreA}`});
});

teams.sort((a,b)=>{
if(b.points!==a.points)return b.points-a.points;
if(b.gd!==a.gd)return b.gd-a.gd;
return b.gf-a.gf;
});

const table=document.getElementById("standings");

teams.forEach((t,i)=>{
const tr=document.createElement("tr");

if(i==0)tr.classList.add("rank1");
if(i==1)tr.classList.add("rank2");
if(i==2)tr.classList.add("rank3");

tr.innerHTML=`
<td>${i+1}</td>
<td>${t.name}</td>
<td>${t.played}</td>
<td>${t.wins}</td>
<td>${t.draws}</td>
<td>${t.losses}</td>
<td>${t.points}</td>
<td>${t.gd}</td>
<td>${t.gf}</td>
<td>${t.ga}</td>
`;

table.appendChild(tr);

});

</script>
</body>
</html>
