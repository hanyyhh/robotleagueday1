<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSR | Tactical Command Center</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-blue: #0ea5e9;
            --dark-space: #010409;
            --panel-glass: rgba(10, 25, 47, 0.7);
            --fsr-logo: url('image.png'); 
        }

        body {
            background-color: var(--dark-space);
            color: #f1f5f9;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            margin: 0;
            background-attachment: fixed;
        }

        .background-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a192f 0%, #010409 100%);
        }

        .floating-logo {
            position: absolute;
            width: 60px;
            height: 60px;
            background-image: var(--fsr-logo);
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.15;
            filter: drop-shadow(0 0 5px var(--neon-cyan));
            animation: swim 20s linear infinite;
        }

        @keyframes swim {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(100px, 150px) rotate(90deg); }
            50% { transform: translate(250px, 50px) rotate(180deg); }
            75% { transform: translate(50px, 200px) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        header {
            padding: 50px 0;
            text-align: center;
            border-bottom: 2px solid var(--neon-cyan);
            background: linear-gradient(180deg, rgba(0, 242, 255, 0.1) 0%, transparent 100%);
            backdrop-filter: blur(15px);
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 55% 80%, 50% 100%, 45% 80%, 0 80%);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 12px;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-blue);
            margin: 0;
        }

        .main-container { padding-top: 60px; }

        .leaderboard-wrapper {
            background: var(--panel-glass);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 0;
            position: relative;
            padding: 20px;
            box-shadow: inset 0 0 30px rgba(0, 242, 255, 0.05);
        }

        .leaderboard-wrapper::before, .leaderboard-wrapper::after {
            content: ""; position: absolute; width: 30px; height: 30px;
            border: 3px solid var(--neon-cyan);
        }
        .leaderboard-wrapper::before { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
        .leaderboard-wrapper::after { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }

        .table-tactical {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
        }

        .table-tactical tr {
            background: rgba(255, 255, 255, 0.03);
            transition: 0.4s;
            clip-path: polygon(2% 0, 100% 0, 98% 100%, 0% 100%);
        }

        .table-tactical tr:hover {
            background: rgba(0, 242, 255, 0.15);
            transform: scale(1.02);
            cursor: pointer;
        }

        .rank-id {
            font-family: 'Orbitron';
            color: var(--neon-cyan);
            font-size: 1.5rem;
            padding-left: 20px;
        }

        .pts-badge {
            background: var(--neon-cyan);
            color: #000;
            font-weight: 900;
            padding: 5px 15px;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
        }

        .modal-content {
            background: rgba(1, 4, 9, 0.95);
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
            border-radius: 0;
        }

        .stat-box {
            border: 1px solid var(--neon-blue);
            padding: 15px;
            text-align: center;
            background: linear-gradient(45deg, rgba(14, 165, 233, 0.1), transparent);
        }
    </style>
</head>
<body>

<div class="background-container" id="bg-assets"></div>

<header>
    <div class="container">
        <div style="font-size: 0.7rem; letter-spacing: 5px; color: var(--neon-blue);">ENCRYPTED UPLINK // FSR_MAIN_FRAME</div>
        <h1>TACTICAL DASHBOARD</h1>
    </div>
</header>

<div class="container main-container mb-5">
    <div class="leaderboard-wrapper">
        <div class="table-responsive">
            <table class="table-tactical text-light">
                <thead>
                    <tr style="background: transparent; clip-path: none; color: var(--neon-blue);">
                        <th class="p-3">#</th>
                        <th>OPERATIONAL UNIT</th>
                        <th>MP</th>
                        <th>W</th>
                        <th>D</th>
                        <th>L</th>
                        <th>GD</th>
                        <th>POINTS</th>
                    </tr>
                </thead>
                <tbody id="standings"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="teamModal">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h2 id="teamTitle" class="text-white Orbitron m-0"></h2>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3 mb-4" id="statSummary">
                    <div class="col-4"><div class="stat-box">WINS<h3 id="m-wins" class="text-info"></h3></div></div>
                    <div class="col-4"><div class="stat-box">DRAWS<h3 id="m-draws" class="text-warning"></h3></div></div>
                    <div class="col-4"><div class="stat-box">LOSSES<h3 id="m-losses" class="text-danger"></h3></div></div>
                </div>
                <div id="members" class="mb-4"></div>
                <div class="table-responsive">
                    <table class="table table-dark table-hover">
                        <tbody id="history"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {name:"Team 13",played:0,wins:0,draws:0,losses:0,points:0,gd:0,gf:0,ga:0,members:["hani ez zhar","Ahmed Samir maqdissi","Ismail Sabir","Doha faih","salah eddin harouache","Zarghoune Islam"],history:[]},
    {name:"Team 14",played:0,wins:0,draws:0,losses:0,points:0,gd:0,gf:0,ga:0,members:["TAHA EL GHASSEL","Mohamed yassine elkhatibi","Douhaoui Douae","Bertal sara","Imane abidar","Hossine brital"],history:[]},
    {name:"Team 15",played:0,wins:0,draws:0,losses:0,points:0,gd:0,gf:0,ga:0,members:["Youssef Yadini","Oussama ID LAASRI","Hafssa Mahjoub","Belokda houda","Nour EL hajji","Hanane boukassal"],history:[]},
    {name:"Team 16",played:0,wins:0,draws:0,losses:0,points:0,gd:0,gf:0,ga:0,members:["Belghazi Basma","Tarmoun marwa","Yahya litim","Bouchra Balaje","Aoussam Rania","Abderrahmane ait mansour","Soukaina benzaddou"],history:[]},
    {name:"Team 17",played:0,wins:0,draws:0,losses:0,points:0,gd:0,gf:0,ga:0,members:["Yasser Yjjou","Nissrine el haini","Fath-allah amine","Soufiane chlieh","Zayneb Richard","soumia BEN-FARES"],history:[]},
    {name:"Team 18",played:0,wins:0,draws:0,losses:0,points:0,gd:0,gf:0,ga:0,members:["Amine essalhi","Safa tarmoun","yassine hatana","Hafsa kadmi","Soufiane labrag","Aya El_frouni"],history:[]}
];

const day1=[{teamA:"Team 1",teamB:"Team 16",scoreA:0,scoreB:4,date:"2026-03-07"},{teamA:"Team 2",teamB:"Team 15",scoreA:2,scoreB:0,date:"2026-03-07"},{teamA:"Team 3",teamB:"Team 14",scoreA:4,scoreB:4,date:"2026-03-07"},{teamA:"Team 4",teamB:"Team 13",scoreA:0,scoreB:4,date:"2026-03-07"},{teamA:"Team 5",teamB:"Team 12",scoreA:1,scoreB:0,date:"2026-03-07"},{teamA:"Team 6",teamB:"Team 17",scoreA:1,scoreB:2,date:"2026-03-07"},{teamA:"Team 7",teamB:"Team 10",scoreA:2,scoreB:0,date:"2026-03-07"},{teamA:"Team 8",teamB:"Team 9",scoreA:0,scoreB:2,date:"2026-03-07"},{teamA:"Team 18",teamB:"Team 11",scoreA:0,scoreB:4,date:"2026-03-07"}];
const day2=[{teamA:"Team 18",teamB:"Team 13",scoreA:0,scoreB:2,date:"2026-03-08"},{teamA:"Team 3",teamB:"Team 12",scoreA:0,scoreB:0,date:"2026-03-08"},{teamA:"Team 6",teamB:"Team 9",scoreA:1,scoreB:0,date:"2026-03-08"},{teamA:"Team 4",teamB:"Team 11",scoreA:4,scoreB:0,date:"2026-03-08"},{teamA:"Team 7",teamB:"Team 8",scoreA:3,scoreB:0,date:"2026-03-08"},{teamA:"Team 5",teamB:"Team 10",scoreA:4,scoreB:0,date:"2026-03-08"},{teamA:"Team 17",teamB:"Team 2",scoreA:0,scoreB:2,date:"2026-03-08"},{teamA:"Team 1",teamB:"Team 15",scoreA:4,scoreB:0,date:"2026-03-08"},{teamA:"Team 16",teamB:"Team 14",scoreA:1,scoreB:0,date:"2026-03-08"}];
const day3=[{teamA:"Team 1",teamB:"Team 14",scoreA:0,scoreB:3,date:"2026-03-09"},{teamA:"Team 15",teamB:"Team 13",scoreA:1,scoreB:0,date:"2026-03-09"},{teamA:"Team 16",teamB:"Team 12",scoreA:0,scoreB:2,date:"2026-03-09"},{teamA:"Team 2",teamB:"Team 11",scoreA:4,scoreB:0,date:"2026-03-09"},{teamA:"Team 5",teamB:"Team 8",scoreA:1,scoreB:0,date:"2026-03-09"},{teamA:"Team 6",teamB:"Team 7",scoreA:0,scoreB:4,date:"2026-03-09"},{teamA:"Team 3",teamB:"Team 10",scoreA:4,scoreB:0,date:"2026-03-09"},{teamA:"Team 4",teamB:"Team 9",scoreA:0,scoreB:1,date:"2026-03-09"},{teamA:"Team 17",teamB:"Team 18",scoreA:1,scoreB:1,date:"2026-03-09"}];
const day4=[{teamA:"Team 17",teamB:"Team 5",scoreA:0,scoreB:3,date:"2026-03-10"},{teamA:"Team 4",teamB:"Team 7",scoreA:1,scoreB:2,date:"2026-03-10"},{teamA:"Team 6",teamB:"Team 18",scoreA:3,scoreB:1,date:"2026-03-10"},{teamA:"Team 1",teamB:"Team 13",scoreA:1,scoreB:1,date:"2026-03-10"},{teamA:"Team 14",teamB:"Team 12",scoreA:0,scoreB:3,date:"2026-03-10"},{teamA:"Team 15",teamB:"Team 11",scoreA:2,scoreB:1,date:"2026-03-10"},{teamA:"Team 16",teamB:"Team 10",scoreA:0,scoreB:0,date:"2026-03-10"},{teamA:"Team 2",teamB:"Team 9",scoreA:4,scoreB:0,date:"2026-03-10"},{teamA:"Team 3",teamB:"Team 8",scoreA:3,scoreB:1,date:"2026-03-10"}];

function update(results){
    results.forEach(r=>{
        const A=teams.find(t=>t.name===r.teamA);
        const B=teams.find(t=>t.name===r.teamB);
        A.played++;B.played++;
        A.gf+=r.scoreA;A.ga+=r.scoreB;
        B.gf+=r.scoreB;B.ga+=r.scoreA;
        A.gd=A.gf-A.ga; B.gd=B.gf-B.ga;
        if(r.scoreA>r.scoreB){A.wins++;A.points+=3;B.losses++;}
        else if(r.scoreB>r.scoreA){B.wins++;B.points+=3;A.losses++;}
        else{A.draws++;B.draws++;A.points++;B.points++;}
        A.history.push({date:r.date,opponent:B.name,result:r.scoreA>r.scoreB?"W":r.scoreA<r.scoreB?"L":"D",score:r.scoreA+"-"+r.scoreB});
        B.history.push({date:r.date,opponent:A.name,result:r.scoreB>r.scoreA?"W":r.scoreB<r.scoreA?"L":"D",score:r.scoreB+"-"+r.scoreA});
    });
}

// Order of execution is critical for history logs
update(day1); 
update(day2); 
update(day3); 
update(day4); 
update(day5);

function standings(){
    const table=document.getElementById("standings");
    table.innerHTML="";
    // Sort by Points, then by Goal Difference
    teams.sort((a,b)=>b.points-a.points||b.gd-a.gd);
    teams.forEach((t,i)=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`
            <td class="rank-id">${i+1}</td>
            <td class="fw-bold Orbitron">${t.name}</td>
            <td>${t.played}</td>
            <td>${t.wins}</td>
            <td>${t.draws}</td>
            <td>${t.losses}</td>
            <td style="color:${t.gd>=0?'var(--neon-cyan)':'#f87171'}">${t.gd>0?'+'+t.gd:t.gd}</td>
            <td><span class="pts-badge">${t.points}</span></td>
        `;
        tr.onclick=()=>showTeam(t);
        table.appendChild(tr);
    });
}

function showTeam(team){
    document.getElementById("teamTitle").innerText=team.name;
    document.getElementById("m-wins").innerText = team.wins;
    document.getElementById("m-draws").innerText = team.draws;
    document.getElementById("m-losses").innerText = team.losses;
    const members=document.getElementById("members");
    members.innerHTML="";
    team.members.forEach(m=>{
        const span=document.createElement("span");
        span.className="badge border border-info m-1 text-info p-2";
        span.textContent=m;
        members.appendChild(span);
    });
    const history=document.getElementById("history");
    history.innerHTML="";
    team.history.forEach(h=>{
        const resClass = h.result === 'W' ? 'text-info' : (h.result === 'L' ? 'text-danger' : 'text-warning');
        const tr=document.createElement("tr");
        tr.innerHTML=`<td>${h.date}</td><td>VS ${h.opponent}</td><td class="${resClass}">${h.result}</td><td>${h.score}</td>`;
        history.appendChild(tr);
    });
    new bootstrap.Modal(document.getElementById("teamModal")).show();
}

standings();
</script>

</html>
