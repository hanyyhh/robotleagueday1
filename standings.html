<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robotics Tournament Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  font-family:Inter, sans-serif;
  background:#0f172a;
  color:#e2e8f0;
  margin:0;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:linear-gradient(120deg, rgba(59,130,246,0.05) 1px, transparent 1px), 
             linear-gradient(30deg, rgba(59,130,246,0.05) 1px, transparent 1px);
  background-size:50px 50px;
  z-index:-1;
}

header{
  text-align:center;
  padding:30px 15px;
}

header h1{
  color:#3b82f6;
  font-weight:700;
  text-shadow:0 0 20px #3b82f6;
}

main{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h2{
  text-align:center;
  margin:40px 0 20px;
  color:#3b82f6;
  text-shadow:0 0 10px #3b82f6;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:50px;
}

thead th{
  padding:10px;
  color:#3b82f6;
  border-bottom:2px solid #3b82f6;
}

tbody td{
  padding:8px;
  text-align:center;
  border-bottom:1px solid #1e3a8a;
  transition:0.3s all;
}

tbody tr{
  cursor:pointer;
  transition:0.3s all;
}

tbody tr:hover{
  background:#1e293b;
  color:#fff;
  text-shadow:0 0 8px #3b82f6;
}

.rank1 td{color:#ffd700; text-shadow:0 0 15px gold;}
.rank2 td{color:#c0c0c0; text-shadow:0 0 12px silver;}
.rank3 td{color:#cd7f32; text-shadow:0 0 12px #cd7f32;}

.matches-table td{
  transition:0.3s all;
}

.matches-table tr:hover td{
  background:#1e293b;
  color:#60a5fa;
  text-shadow:0 0 8px #3b82f6;
}

.next-match td{
  background:#1e3a8a;
  color:#60a5fa;
  font-weight:bold;
  text-shadow:0 0 8px #3b82f6;
}

.modal-header{
  background:#1e40af;
  color:white;
}

.modal-table th{
  background:#0f172a;
  color:#3b82f6;
  text-align:center;
  border-bottom:1px solid #3b82f6;
}

.modal-table td{
  text-align:center;
  padding:8px 0;
  border-bottom:1px solid #1e40af;
}
</style>
</head>

<body>

<header>
<h1>Robotics Tournament</h1>
</header>

<main>

<h2>Standings</h2>
<table>
<thead>
<tr>
<th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>Pts</th><th>GD</th><th>GF</th><th>GA</th>
</tr>
</thead>
<tbody id="standings"></tbody>
</table>

<h2>Match Schedule</h2>
<table class="matches-table">
<thead>
<tr>
<th>#</th><th>Team A</th><th>Team B</th><th>Date</th>
</tr>
</thead>
<tbody id="matches"></tbody>
</table>

</main>

<!-- Team Modal -->
<div class="modal fade" id="teamModal">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content bg-dark text-light">
<div class="modal-header">
<h5 class="modal-title" id="teamTitle"></h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<h5>Members</h5>
<ul id="members"></ul>

<h5>Performance</h5>
<p id="performanceText"></p>

<h5>Match History</h5>
<table class="table table-dark modal-table">
<thead>
<tr>
<th>Date</th><th>Opponent</th><th>Result</th><th>Score</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const teams = [
{name:"Team 1", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Soufiane selmani","Fatimezzhra ait bahanni","Bouyadmar adam","Nabil sebbar","Allali mariam","Alae ahrour"], history:[]},
{name:"Team 2", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Achraf Akhtar","ABDELILAH ALLOUT","Safae Essaib","Aimad Ait Ouarkhane","Ibrahim DJI","Cherkaoui Faris"], history:[]},
{name:"Team 3", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Khalifa Mohamed khaifa","Hiba er-roufi","Amina boubghi","Omar bouya","Hajar touarane","Yassine Hatana","Hajar Nadi"], history:[]},
{name:"Team 4", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Mohamed Ayman Roukhsi","Ismail el faouzi","maryeme hibatallah","Lachhab mohamed","marwa benhouad","Zineb Boussaq","Douaa machehour"], history:[]},
{name:"Team 5", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Oussama hrioued","Lemsyah majda","Basma naddari","Daaraoui Kenza","Daif hajar","Yasser Boulaajoul","Lina Elksabi"], history:[]},
{name:"Team 6", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Leila manssouri azzouzi","Yassine Bekkali","mouad archkak","Bournakhla mohammed","Chaimae Gannaoui","Kada fatima zohra","Yasmine hamsane"], history:[]},
{name:"Team 7", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Jou hamza","IHSSANE ELAABOUS","Doha zouahri","AGZAL ADAM","Fatima zzahra Hamzaoui","Aya boutaleb"], history:[]},
{name:"Team 8", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Ayoub hammamoun","Olaya benmimoune","mouad messaoudi","HAMZA NACIRI","Safae ELABDELLAOUI","Aoussam Nezha","racha benhamou"], history:[]},
{name:"Team 9", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Samir Sabri","Walid Mouthar","Douae Lamuoal","Azzam meriem","nid haddou youssef","Ilyas el khairi"], history:[]},
{name:"Team 10", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Moad ait ali oubrahim","Tourab Soukaina","Mahra hlalou","EL MARKADI Hajar","Hamza belkhadir","Ismail joubair","mohamed ammar"], history:[]},
{name:"Team 11", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["ilyas el kabrane","Karim anas ellaiti","El kouri Manal","Aya ibn el ouasyl","Belharba aya","Mouna Benhmimou","DAHIMI Sanae"], history:[]},
{name:"Team 12", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Adam el baroudi","Maha Hafdi","Alae eddine bouryal","Hajar El Harradi","Tasnime slimani","Razouki khadija","Ettalhi chaimae"], history:[]},
{name:"Team 13", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["hani ez zhar","Ahmed Samir maqdissi","Ismail Sabir","Doha faih","salah eddin harouache","Zarghoune Islam"], history:[]},
{name:"Team 14", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["TAHA EL GHASSEL","Mohamed yassine elkhatibi","Douhaoui Douae","Bertal sara","Imane abidar","Hossine brital"], history:[]},
{name:"Team 15", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Youssef Yadini","Oussama ID LAASRI","Hafssa Mahjoub","Belokda houda","Nour EL hajji","Hanane boukassal"], history:[]},
{name:"Team 16", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Belghazi Basma","Tarmoun marwa","Yahya litim","Bouchra Balaje","Aoussam Rania","Abderrahmane ait mansour","Soukaina benzaddou"], history:[]},
{name:"Team 17", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Yasser Yjjou","Nissrine el haini","Fath-allah amine","Soufiane chlieh","Zayneb Richard","soumia BEN-FARES"], history:[]},
{name:"Team 18", played:0, wins:0, draws:0, losses:0, points:0, gd:0, gf:0, ga:0, members:["Amine essalhi","Safa tarmoun","yassine hatana","Hafsa kadmi","Soufiane labrag","Aya El_frouni"], history:[]}
];

// Day 1 Results
const resultsDay1 = [
{teamA: "Team 1", teamB: "Team 16", scoreA: 0, scoreB: 4},
{teamA: "Team 2", teamB: "Team 15", scoreA: 2, scoreB: 0},
{teamA: "Team 3", teamB: "Team 14", scoreA: 4, scoreB: 4},
{teamA: "Team 4", teamB: "Team 13", scoreA: 0, scoreB: 4},
{teamA: "Team 5", teamB: "Team 12", scoreA: 1, scoreB: 0},
{teamA: "Team 6", teamB: "Team 17", scoreA: 1, scoreB: 2},
{teamA: "Team 7", teamB: "Team 10", scoreA: 2, scoreB: 0},
{teamA: "Team 8", teamB: "Team 9", scoreA: 0, scoreB: 2},
{teamA: "Team 18", teamB: "Team 11", scoreA: 0, scoreB: 4}
];

// Full schedule
const schedule=[
["2026-03-07","Team 1","Team 16"],["2026-03-07","Team 2","Team 15"],["2026-03-07","Team 3","Team 14"],["2026-03-07","Team 4","Team 13"],["2026-03-07","Team 5","Team 12"],["2026-03-07","Team 6","Team 17"],["2026-03-07","Team 7","Team 10"],["2026-03-07","Team 8","Team 9"],["2026-03-07","Team 18","Team 11"],
["2026-03-08","Team 1","Team 15"],["2026-03-08","Team 16","Team 14"],["2026-03-08","Team 18","Team 13"],["2026-03-08","Team 3","Team 12"],["2026-03-08","Team 4","Team 11"],["2026-03-08","Team 5","Team 10"],["2026-03-08","Team 6","Team 9"],["2026-03-08","Team 7","Team 8"],["2026-03-08","Team 17","Team 2"],
["2026-03-09","Team 1","Team 11"],["2026-03-09","Team 12","Team 10"],["2026-03-09","Team 18","Team 9"],["2026-03-09","Team 14","Team 8"],["2026-03-09","Team 15","Team 7"],["2026-03-09","Team 16","Team 6"],["2026-03-09","Team 2","Team 5"],["2026-03-09","Team 3","Team 4"],["2026-03-09","Team 13","Team 17"],
["2026-03-10","Team 1","Team 14"],["2026-03-10","Team 15","Team 13"],["2026-03-10","Team 16","Team 12"],["2026-03-10","Team 2","Team 11"],["2026-03-10","Team 3","Team 10"],["2026-03-10","Team 4","Team 9"],["2026-03-10","Team 5","Team 8"],["2026-03-10","Team 6","Team 7"],["2026-03-10","Team 17","Team 18"],
["2026-03-11","Team 1","Team 18"],["2026-03-11","Team 13","Team 11"],["2026-03-11","Team 14","Team 10"],["2026-03-11","Team 15","Team 9"],["2026-03-11","Team 16","Team 8"],["2026-03-11","Team 2","Team 7"],["2026-03-11","Team 3","Team 6"],["2026-03-11","Team 4","Team 5"],["2026-03-11","Team 12","Team 17"],
["2026-03-12","Team 1","Team 13"],["2026-03-12","Team 14","Team 12"],["2026-03-12","Team 15","Team 11"],["2026-03-12","Team 16","Team 10"],["2026-03-12","Team 2","Team 9"],["2026-03-12","Team 3","Team 8"],["2026-03-12","Team 4","Team 7"],["2026-03-12","Team 5","Team 17"],["2026-03-12","Team 6","Team 18"]
];

document.addEventListener("DOMContentLoaded", function(){

  // Apply Day 1 results
  resultsDay1.forEach(r=>{
    const teamA = teams.find(t=>t.name===r.teamA);
    const teamB = teams.find(t=>t.name===r.teamB);
    
    teamA.played++; teamB.played++;
    teamA.gf += r.scoreA; teamA.ga += r.scoreB;
    teamB.gf += r.scoreB; teamB.ga += r.scoreA;

    teamA.gd = teamA.gf - teamA.ga;
    teamB.gd = teamB.gf - teamB.ga;

    if(r.scoreA>r.scoreB){teamA.wins++; teamA.points+=3; teamB.losses++;}
    else if(r.scoreA<r.scoreB){teamB.wins++; teamB.points+=3; teamA.losses++;}
    else {teamA.draws++; teamB.draws++; teamA.points++; teamB.points++;}

    // Add history
    teamA.history.push({date:"2026-03-07", opponent:r.teamB, result:r.scoreA>r.scoreB?"W":(r.scoreA<r.scoreB?"L":"D"), score:`${r.scoreA}-${r.scoreB}`});
    teamB.history.push({date:"2026-03-07", opponent:r.teamA, result:r.scoreB>r.scoreA?"W":(r.scoreB<r.scoreA?"L":"D"), score:`${r.scoreB}-${r.scoreA}`});
  });

  // Sort teams by points, gd, gf
  teams.sort((a,b)=>{
    if(b.points!==a.points) return b.points-a.points;
    if(b.gd!==a.gd) return b.gd-a.gd;
    return b.gf-a.gf;
  });

  // Populate Standings
  const standings = document.getElementById("standings");
  standings.innerHTML="";
  teams.forEach((t,i)=>{
    const tr=document.createElement("tr");
    if(i===0) tr.classList.add("rank1");
    else if(i===1) tr.classList.add("rank2");
    else if(i===2) tr.classList.add("rank3");

    tr.innerHTML=`<td>${i+1}</td>
    <td>${t.name}</td>
    <td>${t.played}</td>
    <td>${t.wins}</td>
    <td>${t.draws}</td>
    <td>${t.losses}</td>
    <td>${t.points}</td>
    <td>${t.gd}</td>
    <td>${t.gf}</td>
    <td>${t.ga}</td>`;
    
    tr.onclick=()=>showTeam(t);
    standings.appendChild(tr);
  });

  // Populate matches
  const matches = document.getElementById("matches");
  matches.innerHTML="";
  schedule.forEach((m,i)=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${i+1}</td><td>${m[1]}</td><td>${m[2]}</td><td>${m[0]}</td>`;
    matches.appendChild(tr);
  });

  // Highlight next match
  function highlightNextMatch(){
    const today = new Date();
    matches.querySelectorAll("tr").forEach(tr=>tr.classList.remove("next-match"));
    for(let tr of matches.querySelectorAll("tr")){
      const dateStr = tr.children[3].textContent;
      const parts = dateStr.split("-");
      const matchDate = new Date(parts[0], parts[1]-1, parts[2], 10,0,0);
      if(matchDate >= today){
        tr.classList.add("next-match");
        break;
      }
    }
  }

  highlightNextMatch();
  setInterval(highlightNextMatch,60000);

  // Show Team Modal
  function showTeam(team){
    document.getElementById("teamTitle").textContent=team.name;
    const members=document.getElementById("members");
    members.innerHTML="";
    team.members.forEach(m=>{
      const li=document.createElement("li");
      li.textContent=m;
      members.appendChild(li);
    });
    document.getElementById("performanceText").textContent=
      `Wins: ${team.wins}, Draws: ${team.draws}, Losses: ${team.losses}, GF: ${team.gf}, GA: ${team.ga}`;

    const history=document.getElementById("history");
    history.innerHTML="";
    team.history.forEach(h=>{
      const tr=document.createElement("tr");
      tr.innerHTML=`<td>${h.date}</td><td>${h.opponent}</td><td>${h.result}</td><td>${h.score}</td>`;
      history.appendChild(tr);
    });

    new bootstrap.Modal(document.getElementById("teamModal")).show();
  }

});
</script>
</body>
</html>
