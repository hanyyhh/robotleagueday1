<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robotics Tournament Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  font-family:Inter, sans-serif;
  background:#0f172a;
  color:#e2e8f0;
  margin:0;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:linear-gradient(120deg, rgba(59,130,246,0.05) 1px, transparent 1px), 
             linear-gradient(30deg, rgba(59,130,246,0.05) 1px, transparent 1px);
  background-size:50px 50px;
  z-index:-1;
}

header{
  text-align:center;
  padding:30px 15px;
}

header h1{
  color:#3b82f6;
  font-weight:700;
  text-shadow:0 0 20px #3b82f6;
}

main{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h2{
  text-align:center;
  margin:40px 0 20px;
  color:#3b82f6;
  text-shadow:0 0 10px #3b82f6;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:50px;
}

thead th{
  padding:10px;
  color:#3b82f6;
  border-bottom:2px solid #3b82f6;
}

tbody td{
  padding:8px;
  text-align:center;
  border-bottom:1px solid #1e3a8a;
  transition:0.3s all;
}

tbody tr{
  cursor:pointer;
  transition:0.3s all;
}

tbody tr:hover{
  background:#1e293b;
  color:#fff;
  text-shadow:0 0 8px #3b82f6;
}

.rank1 td{color:#ffd700; text-shadow:0 0 15px gold;}
.rank2 td{color:#c0c0c0; text-shadow:0 0 12px silver;}
.rank3 td{color:#cd7f32; text-shadow:0 0 12px #cd7f32;}

.matches-table td{
  transition:0.3s all;
}

.matches-table tr:hover td{
  background:#1e293b;
  color:#60a5fa;
  text-shadow:0 0 8px #3b82f6;
}

.next-match td{
  background:#1e3a8a;
  color:#60a5fa;
  font-weight:bold;
  text-shadow:0 0 8px #3b82f6;
}

.modal-header{
  background:#1e40af;
  color:white;
}

.modal-table th{
  background:#0f172a;
  color:#3b82f6;
  text-align:center;
  border-bottom:1px solid #3b82f6;
}

.modal-table td{
  text-align:center;
  padding:8px 0;
  border-bottom:1px solid #1e40af;
}
</style>
</head>

<body>

<header>
<h1>Robotics Tournament</h1>
</header>

<main>

<h2>Standings</h2>
<table>
<thead>
<tr>
<th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>Pts</th><th>GD</th><th>GF</th><th>GA</th>
</tr>
</thead>
<tbody id="standings"></tbody>
</table>

<h2>Match Schedule</h2>
<table class="matches-table">
<thead>
<tr>
<th>#</th><th>Team A</th><th>Team B</th><th>Day</th>
</tr>
</thead>
<tbody id="matches"></tbody>
</table>

</main>

<!-- Team Modal -->
<div class="modal fade" id="teamModal">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content bg-dark text-light">
<div class="modal-header">
<h5 class="modal-title" id="teamTitle"></h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<h5>Members</h5>
<ul id="members"></ul>

<h5>Performance</h5>
<p id="performanceText"></p>

<h5>Match History</h5>
<table class="table table-dark modal-table">
<thead>
<tr>
<th>Day</th><th>Opponent</th><th>Result</th><th>Score</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const teams = [
{name:"Team 1", members:["Soufiane selmani","Fatimezzhra ait bahanni","Bouyadmar adam","Nabil sebbar","Allali mariam","Alae ahrour"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 2", members:["Achraf Akhtar","ABDELILAH ALLOUT","Safae Essaib","Aimad Ait Ouarkhane","Ibrahim DJI","Cherkaoui Faris"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 3", members:["Khalifa Mohamed khaifa","Hiba er-roufi","Amina boubghi","Omar bouya","Hajar touarane","Yassine Hatana","Hajar Nadi"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 4", members:["Mohamed Ayman Roukhsi","Ismail el faouzi","maryeme hibatallah","Lachhab mohamed","marwa benhouad","Zineb Boussaq","Douaa machehour"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 5", members:["Oussama hrioued","Lemsyah majda","Basma naddari","Daaraoui Kenza","Daif hajar","Yasser Boulaajoul","Lina Elksabi"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 6", members:["Leila manssouri azzouzi","Yassine Bekkali","mouad archkak","Bournakhla mohammed","Chaimae Gannaoui","Kada fatima zohra","Yasmine hamsane"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 7", members:["Jou hamza","IHSSANE ELAABOUS","Doha zouahri","AGZAL ADAM","Fatima zzahra Hamzaoui","Aya boutaleb"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 8", members:["Ayoub hammamoun","Olaya benmimoune","mouad messaoudi","HAMZA NACIRI","Safae ELABDELLAOUI","Aoussam Nezha","racha benhamou"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 9", members:["Samir Sabri","Walid Mouthar","Douae Lamuoal","Azzam meriem","nid haddou youssef","Ilyas el khairi"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 10", members:["Moad ait ali oubrahim","Tourab Soukaina","Mahra hlalou","EL MARKADI Hajar","Hamza belkhadir","Ismail joubair","mohamed ammar"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 11", members:["ilyas el kabrane","Karim anas ellaiti","El kouri Manal","Aya ibn el ouasyl","Belharba aya","Mouna Benhmimou","DAHIMI Sanae"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 12", members:["Adam el baroudi","Maha Hafdi","Alae eddine bouryal","Hajar El Harradi","Tasnime slimani","Razouki khadija","Ettalhi chaimae"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 13", members:["hani ez zhar","Ahmed Samir maqdissi","Ismail Sabir","Doha faih","salah eddin harouache","Zarghoune Islam"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 14", members:["TAHA EL GHASSEL","Mohamed yassine elkhatibi","Douhaoui Douae","Bertal sara","Imane abidar","Hossine brital"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 15", members:["Youssef Yadini","Oussama ID LAASRI","Hafssa Mahjoub","Belokda houda","Nour EL hajji","Hanane boukassal"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 16", members:["Belghazi Basma","Tarmoun marwa","Yahya litim","Bouchra Balaje","Aoussam Rania","Abderrahmane ait mansour","Soukaina benzaddou"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 17", members:["Yasser Yjjou","Nissrine el haini","Fath-allah amine","Soufiane chlieh","Zayneb Richard","soumia BEN-FARES"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0},
{name:"Team 18", members:["Amine essalhi","Safa tarmoun","yassine hatana","Hafsa kadmi","Soufiane labrag","Aya El_frouni"], history:[], played:0, wins:0, draws:0, losses:0, points:0, gf:0, ga:0, gd:0}
];

// Day 1 results
const resultsDay1 = [
  {teamA:"Team 1", teamB:"Team 16", scoreA:0, scoreB:4},
  {teamA:"Team 2", teamB:"Team 15", scoreA:2, scoreB:0},
  {teamA:"Team 3", teamB:"Team 14", scoreA:4, scoreB:4},
  {teamA:"Team 4", teamB:"Team 13", scoreA:0, scoreB:4},
  {teamA:"Team 5", teamB:"Team 12", scoreA:1, scoreB:0},
  {teamA:"Team 6", teamB:"Team 17", scoreA:1, scoreB:2},
  {teamA:"Team 7", teamB:"Team 10", scoreA:2, scoreB:0},
  {teamA:"Team 8", teamB:"Team 9", scoreA:0, scoreB:2},
  {teamA:"Team 18", teamB:"Team 11", scoreA:0, scoreB:4}
];

// Schedule (Days 1–6) using Day numbers
const schedule = [
  ["Day 1","Team 1","Team 16"],["Day 1","Team 2","Team 15"],["Day 1","Team 3","Team 14"],["Day 1","Team 4","Team 13"],
  ["Day 1","Team 5","Team 12"],["Day 1","Team 6","Team 17"],["Day 1","Team 7","Team 10"],["Day 1","Team 8","Team 9"],["Day 1","Team 18","Team 11"],
  ["Day 2","Team 1","Team 15"],["Day 2","Team 16","Team 14"],["Day 2","Team 18","Team 13"],["Day 2","Team 3","Team 12"],["Day 2","Team 4","Team 11"],
  ["Day 2","Team 5","Team 10"],["Day 2","Team 6","Team 9"],["Day 2","Team 7","Team 8"],["Day 2","Team 17","Team 2"],
  ["Day 3","Team 1","Team 11"],["Day 3","Team 12","Team 10"],["Day 3","Team 18","Team 9"],["Day 3","Team 14","Team 8"],["Day 3","Team 15","Team 7"],
  ["Day 3","Team 16","Team 6"],["Day 3","Team 2","Team 5"],["Day 3","Team 3","Team 4"],["Day 3","Team 13","Team 17"],
  ["Day 4","Team 1","Team 14"],["Day 4","Team 15","Team 13"],["Day 4","Team 16","Team 12"],["Day 4","Team 2","Team 11"],["Day 4","Team 3","Team 10"],
  ["Day 4","Team 4","Team 9"],["Day 4","Team 5","Team 8"],["Day 4","Team 6","Team 7"],["Day 4","Team 17","Team 18"],
  ["Day 5","Team 1","Team 18"],["Day 5","Team 13","Team 11"],["Day 5","Team 14","Team 10"],["Day 5","Team 15","Team 9"],["Day 5","Team 16","Team 8"],
  ["Day 5","Team 2","Team 7"],["Day 5","Team 3","Team 6"],["Day 5","Team 4","Team 5"],["Day 5","Team 12","Team 17"],
  ["Day 6","Team 1","Team 13"],["Day 6","Team 14","Team 12"],["Day 6","Team 15","Team 11"],["Day 6","Team 16","Team 10"],["Day 6","Team 2","Team 9"],
  ["Day 6","Team 3","Team 8"],["Day 6","Team 4","Team 7"],["Day 6","Team 5","Team 17"],["Day 6","Team 6","Team 18"]
];

// Apply Day 1 results to teams
resultsDay1.forEach(r=>{
  const teamA = teams.find(t=>t.name===r.teamA);
  const teamB = teams.find(t=>t.name===r.teamB);

  // Update played
  teamA.played++; teamB.played++;

  // Update goals
  teamA.gf += r.scoreA; teamA.ga += r.scoreB;
  teamB.gf += r.scoreB; teamB.ga += r.scoreA;
  teamA.gd = teamA.gf - teamA.ga;
  teamB.gd = teamB.gf - teamB.ga;

  // Update wins/draws/losses
  if(r.scoreA>r.scoreB){ teamA.wins++; teamB.losses++; teamA.points+=3; }
  else if(r.scoreA<r.scoreB){ teamB.wins++; teamA.losses++; teamB.points+=3; }
  else{ teamA.draws++; teamB.draws++; teamA.points++; teamB.points++; }

  // Update history
  teamA.history.push({day:"Day 1", opponent:r.teamB, result:r.scoreA>r.scoreB?"W":(r.scoreA<r.scoreB?"L":"D"), score:`${r.scoreA}-${r.scoreB}`});
  teamB.history.push({day:"Day 1", opponent:r.teamA, result:r.scoreB>r.scoreA?"W":(r.scoreB<r.scoreA?"L":"D"), score:`${r.scoreB}-${r.scoreA}`});
});

// Sort teams by points → gd → gf
teams.sort((a,b)=>{
  if(b.points!==a.points) return b.points-a.points;
  if(b.gd!==a.gd) return b.gd-a.gd;
  return b.gf-a.gf;
});

// Populate Standings
const standings = document.getElementById("standings");
standings.innerHTML="";
teams.forEach((t,i)=>{
  const tr=document.createElement("tr");
  if(i===0) tr.classList.add("rank1");
  else if(i===1) tr.classList.add("rank2");
  else if(i===2) tr.classList.add("rank3");
  tr.innerHTML=`<td>${i+1}</td><td>${t.name}</td><td>${t.played}</td><td>${t.wins}</td><td>${t.draws}</td><td>${t.losses}</td><td>${t.points}</td><td>${t.gd}</td><td>${t.gf}</td><td>${t.ga}</td>`;
  tr.onclick=()=>showTeam(t);
  standings.appendChild(tr);
});

// Populate matches table
const matchesEl = document.getElementById("matches");
matchesEl.innerHTML="";
schedule.forEach((m,i)=>{
  const tr=document.createElement("tr");
  tr.innerHTML=`<td>${i+1}</td><td>${m[1]}</td><td>${m[2]}</td><td>${m[0]}</td>`;
  matchesEl.appendChild(tr);
});

// Show Team Modal
function showTeam(team){
  document.getElementById("teamTitle").textContent=team.name;
  const members=document.getElementById("members");
  members.innerHTML="";
  team.members.forEach(m=>{
    const li=document.createElement("li");
    li.textContent=m;
    members.appendChild(li);
  });
  document.getElementById("performanceText").textContent=`Wins: ${team.wins}, Draws: ${team.draws}, Losses: ${team.losses}`;
  const history=document.getElementById("history");
  history.innerHTML="";
  team.history.forEach(h=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${h.day}</td><td>${h.opponent}</td><td>${h.result}</td><td>${h.score}</td>`;
    history.appendChild(tr);
  });
  new bootstrap.Modal(document.getElementById("teamModal")).show();
}
</script>
</body>
</html>
